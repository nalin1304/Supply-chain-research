[pytest]
testpaths = tests
python_files = test_*
python_functions = test_*

# Test tier markers (Audit Phase Zero — pytest taxonomy)
markers =
    unit: fast unit tests (<1s each)
    integration: cross-module integration tests
    slow: tests that take >5s
    gpu: tests requiring CUDA
    regression: tests against NUMERIC_BASELINE.json

# Default: skip slow and gpu tests
addopts =
    --strict-markers
    -m "not slow and not gpu"
    --tb=short

# Per-test timeout (override with -p no:timeout for long runs)
timeout = 120
